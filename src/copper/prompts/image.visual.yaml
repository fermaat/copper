name: image.visual
description: |
  User prompt for the multimodal image describer. 
  Generates descriptions and extracts key entities for semantic matching.
template: |
  Describe the VISUAL content of this image following these rules:
  
  1. ANALYZE: Identify characters, creatures, locations, or diagrams.
  2. IDENTIFY ENTITIES: If the image has labels, text, or clearly represents a specific entity (e.g., "Yu-Thorak", "Urithiru"), extract those names.
  3. DESCRIBE: Provide 2-3 factual sentences about appearance, colors, and composition.
  4. FORMAT: Start with the name of the entity (if known), then the description, and end with keywords.
  
  Format example:
  "Yu-Thorak. A massive grey-blue creature with segmented skin and hooked jaws on a rocky coast. (Keywords: Yu-Thorak, monster, coastal, crustacean)"

  ---
  CRITICAL RULE: Reply with EXACTLY the single word DECORATIVE (nothing else) if:
  - The image is a border, ornament, flourish, or purely abstract.
  - The image is ONLY a page number, footer, or tiny logo.
  - It's a small icon that adds no informational value.
  - The image is PRIMARILY a block of body text or lore prose rendered on a
    styled or textured background (paragraphs and sentences are the dominant
    content). The page's text is extracted separately, so describing it again
    as an image adds nothing.

  DO NOT reply DECORATIVE for portraits, maps, diagrams, or stat blocks.
  A stat block is a structured table of numerical attributes (e.g. Physical /
  Cognitive / Spiritual scores, ability tables, action lists with mechanics) —
  these ARE valuable. A page of narrative paragraphs is NOT a stat block, even
  if it has section headings.